<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalaryX | AI-Powered Salary Predictor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="glass-card">
            <h1>SalaryX Predictor</h1>
            <p class="subtitle">Enter your career details to get an AI-powered salary estimation</p>

            <form id="predictionForm" class="prediction-form">
                <div class="form-group">
                    <label for="job_title">Job Title</label>
                    <select id="job_title" name="job_title" required>
                        <option value="" disabled selected>Select Job Title</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="experience_years">Years of Experience</label>
                    <input type="number" id="experience_years" name="experience_years" min="0" max="50" step="0.5"
                        placeholder="e.g. 5" required>
                </div>

                <div class="form-group">
                    <label for="education_level">Education Level</label>
                    <select id="education_level" name="education_level" required>
                        <option value="" disabled selected>Select Education</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="industry">Industry</label>
                    <select id="industry" name="industry" required>
                        <option value="" disabled selected>Select Industry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="company_size">Company size</label>
                    <select id="company_size" name="company_size" required>
                        <option value="" disabled selected>Select Size</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <select id="location" name="location" required>
                        <option value="" disabled selected>Select Location</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="skills_count">Number of Skills</label>
                    <input type="number" id="skills_count" name="skills_count" min="0" max="100" placeholder="e.g. 12"
                        required>
                </div>

                <div class="form-group">
                    <label for="certifications">Certifications</label>
                    <input type="number" id="certifications" name="certifications" min="0" max="20" placeholder="e.g. 3"
                        required>
                </div>

                <div class="form-group full-width">
                    <label for="remote_work">Work Preference</label>
                    <select id="remote_work" name="remote_work" required>
                        <option value="" disabled selected>Select Preference</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn full-width" id="submitBtn">
                    <span id="btnText">Calculate Salary</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="resultContainer" class="result-container">
                <p class="result-label">Estimated Annual Salary</p>
                <p class="result-value" id="salaryValue">$0.00</p>
            </div>

            <p id="errorMsg" class="error-msg"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
